# docker-compose.vm.yml – Secrets are injected via environment variables only.
# The deploy script fetches all configuration from GCP and GitHub.

volumes:
  postgres_data_staging:
  postgres_data_production:
  poste_data_staging:
  poste_data_production:
  staticfiles_staging:
  staticfiles_production:

networks:
  humrine-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1460
  # Shared network with badminton_court so containers can resolve each other
  shared-net:
    external: true   # must be created manually: docker network create shared-net

services:
  # ----- Database (staging) -----
  db-staging:
    image: postgres:14
    mem_limit: 128m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    networks:
      - humrine-network
      - shared-net   # added for cross‑project resolution (though not strictly needed for db)
    profiles: [staging]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----- Database (production) -----
  db-production:
    image: postgres:14
    mem_limit: 128m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_production:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    networks:
      - humrine-network
      - shared-net
    profiles: [production]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----- Redis (shared by staging + production, same as badminton_court's pattern) -----
  redis:
    image: redis:7-alpine
    mem_limit: 64m
    ports:
      - "${REDIS_HOST_PORT}:6379"
    networks:
      - humrine-network
      - shared-net
    profiles: [staging, production]

  # ----- Mail (staging) -----
  mail-staging:
    image: ghcr.io/team-sisante/humrine_site-mail:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "${MAIL_SMTP_HOST_PORT}:25"
      - "${MAIL_SUBMISSION_HOST_PORT}:587"
      - "${MAIL_SMTPS_HOST_PORT}:465"
      - "${MAIL_HTTPS_HOST_PORT}:443"
    environment:
      - HTTPS=ON
    volumes:
      - poste_data_staging:/data
    networks:
      - humrine-network
      - shared-net
    profiles: [staging]
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "25"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 60s

  # ----- Mail (production) -----
  mail-production:
    image: ghcr.io/team-sisante/humrine_site-mail:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "${MAIL_SMTP_HOST_PORT}:25"
      - "${MAIL_SUBMISSION_HOST_PORT}:587"
      - "${MAIL_SMTPS_HOST_PORT}:465"
      - "${MAIL_HTTPS_HOST_PORT}:443"
    environment:
      - HTTPS=ON
    volumes:
      - poste_data_production:/data
    networks:
      - humrine-network
      - shared-net
    profiles: [production]
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "25"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 60s

  # ----- Web (staging) -----
  web-staging:
    container_name: humrine-web-staging
    image: ghcr.io/team-sisante/humrine_site-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      # Application
      - ENVIRONMENT=staging
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_LOG_LEVEL=${DJANGO_LOG_LEVEL}
      - PYTHONDONTWRITEBYTECODE=${PYTHONDONTWRITEBYTECODE}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      
      # Site & URLs
      - SITE_HEADER=${SITE_HEADER}
      - SITE_TITLE=${SITE_TITLE}
      - SITE_INDEX_TITLE=${SITE_INDEX_TITLE}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - APP_PROTOCOL=${APP_PROTOCOL}
      - APP_DOMAIN=${APP_DOMAIN}
      - APP_PORT=${APP_PORT}
      - STAGING_APP_URL=${STAGING_APP_URL}
      - PRODUCTION_APP_URL=${PRODUCTION_APP_URL}
      - PROFILE_EDIT_URL=${PROFILE_EDIT_URL}
      - WEB_TEST_PROTOCOL=${WEB_TEST_PROTOCOL}
      - WEB_TEST_HOST=${WEB_TEST_HOST}
      - WEB_TEST_PORT=${WEB_TEST_PORT}
      
      # GCP / Infra
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_ZONE=${GCP_ZONE}
      - GCP_VM_NAME=${GCP_VM_NAME}
      - GCP_VM_IP=${GCP_VM_IP}
      - GCP_MACHINE_TYPE=${GCP_MACHINE_TYPE}
      - VM_SSH_USER=${VM_SSH_USER}
      - GCP_SA_KEY_PATH=${GCP_SA_KEY_PATH}
      
      # Database & Redis
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      
      # Poste.io (SMTP + API + DB)
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - POSTE_ADMIN_PASSWORD=${POSTE_ADMIN_PASSWORD}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - POSTE_PROTOCOL=${POSTE_PROTOCOL}
      - POSTE_HOSTNAME=${POSTE_HOSTNAME}
      - POSTE_PORT=${POSTE_PORT}
      - POSTE_API_USER=${POSTE_API_USER}
      - POSTE_DOMAIN=${POSTE_DOMAIN}
      - POSTEIO_DB_HOST=${POSTEIO_DB_HOST}
      - POSTEIO_DB_PORT=${POSTEIO_DB_PORT}
      - POSTEIO_DB_NAME=${POSTEIO_DB_NAME}
      - POSTEIO_DB_USER=${POSTEIO_DB_USER}
      - POSTEIO_DB_PASSWORD=${POSTEIO_DB_PASSWORD}
      
      # SSL / Tunneling
      - SSL_CERT_FILE=${SSL_CERT_FILE}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE}
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS}
      - TUNNEL_ENABLED=${TUNNEL_ENABLED}
      - TUNNEL_SUBDOMAIN=${TUNNEL_SUBDOMAIN}
      - TUNNEL_URL=${TUNNEL_URL}
      - NGR_AUTHTOKEN=${NGR_AUTHTOKEN}
      
      # Social Auth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET}
      
      # Admin, Support, Regular User & Test User Accounts
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_FIRST_NAME=${ADMIN_FIRST_NAME}
      - ADMIN_LAST_NAME=${ADMIN_LAST_NAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL}
      - REGULARUSER_EMAIL=${REGULARUSER_EMAIL}
      - REGULARUSER_FIRST_NAME=${REGULARUSER_FIRST_NAME}
      - REGULARUSER_LAST_NAME=${REGULARUSER_LAST_NAME}
      - REGULARUSER_PASSWORD=${REGULARUSER_PASSWORD}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - STAFF_ADMIN_EMAIL=${STAFF_ADMIN_EMAIL}
      - STAFF_ADMIN_PASSWORD=${STAFF_ADMIN_PASSWORD}
      - INACTIVE_ADMIN_EMAIL=${INACTIVE_ADMIN_EMAIL}
      - INACTIVE_ADMIN_PASSWORD=${INACTIVE_ADMIN_PASSWORD}
      
      # Git / CI
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_REPO_PROTOCOL=${GIT_REPO_PROTOCOL}
      - GIT_REPO_DOMAIN=${GIT_REPO_DOMAIN}
      - GIT_REPO_USERNAME=${GIT_REPO_USERNAME}
      - GIT_REPO_REPONAME=${GIT_REPO_REPONAME}
      - ENC_PASSPHRASE=${ENC_PASSPHRASE}
      
      # Ports
      - WEB_HOST_PORT=${WEB_HOST_PORT}
      - WEB_HTTPS_PORT=${WEB_HTTPS_PORT}
      - NGINX_STAGING_HOST_PORT=${NGINX_STAGING_HOST_PORT}
      - NGINX_PRODUCTION_HOST_PORT=${NGINX_PRODUCTION_HOST_PORT}
      - POSTGRES_HOST_PORT=${POSTGRES_HOST_PORT}
      - REDIS_HOST_PORT=${REDIS_HOST_PORT}
      - MAIL_SMTP_HOST_PORT=${MAIL_SMTP_HOST_PORT}
      - MAIL_SUBMISSION_HOST_PORT=${MAIL_SUBMISSION_HOST_PORT}
      - MAIL_SMTPS_HOST_PORT=${MAIL_SMTPS_HOST_PORT}
      - MAIL_HTTPS_HOST_PORT=${MAIL_HTTPS_HOST_PORT}
      
      # Data paths
      - DB_PATH=/app/data/db.sqlite3
      - MEDIA_ROOT=/app/data/media
    volumes:
      - ./data:/app/data
      - staticfiles_staging:/app/staticfiles
    depends_on:
      db-staging:
        condition: service_healthy
      redis:
        condition: service_started
      mail-staging:
        condition: service_started
    networks:
      - humrine-network
      - shared-net   # so it can be reached by badminton containers if needed
    profiles:
      - staging

  # ----- Nginx reverse proxy (staging) -----
  nginx-staging:
    container_name: humrine-nginx-staging
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_STAGING_HOST_PORT}:${WEB_HOST_PORT}"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - ./templates/offline.html:/var/www/html/offline.html:ro
      - ./data:/opt/humrine_site/data:ro
      - staticfiles_staging:/opt/humrine_site/staticfiles:ro
    depends_on:
      - web-staging
    networks:
      - humrine-network
      - shared-net   # required to resolve badminton container names
    profiles:
      - staging

  # ----- Cypress E2E tests against staging (on-demand) -----
  cypress-staging:
    container_name: humrine-cypress-staging
    build:
      context: .
      dockerfile: Dockerfile.cypress
    volumes:
      - ./cypress:/e2e/cypress
      - ./cypress.config.js:/e2e/cypress.config.js
      - ./cypress/videos:/e2e/cypress/videos
      - ./cypress/screenshots:/e2e/cypress/screenshots
      - ./scripts:/e2e/scripts
      - ./certs:/certs:ro
    environment:
      - DOCKER_CONTAINER=true
      - CYPRESS_BASEURL=${CYPRESS_BASEURL}
      - CYPRESS_HEADED=${CYPRESS_HEADED}
      - POSTE_API_HOST=${POSTE_PROTOCOL}://${POSTE_HOSTNAME}:${POSTE_PORT}
      - POSTE_API_USER=${POSTE_API_USER}
      - POSTE_ADMIN_PASSWORD=${POSTE_ADMIN_PASSWORD}
    depends_on:
      web-staging:
        condition: service_started
      mail-staging:
        condition: service_healthy
    networks:
      - humrine-network
      - shared-net
    profiles:
      - staging-test

  # ----- Web (production) -----
  web-production:
    container_name: humrine-web-production
    image: ghcr.io/team-sisante/humrine_site-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      # Application
      - ENVIRONMENT=production
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_LOG_LEVEL=${DJANGO_LOG_LEVEL}
      - PYTHONDONTWRITEBYTECODE=${PYTHONDONTWRITEBYTECODE}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      
      # Site & URLs
      - SITE_HEADER=${SITE_HEADER}
      - SITE_TITLE=${SITE_TITLE}
      - SITE_INDEX_TITLE=${SITE_INDEX_TITLE}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - APP_PROTOCOL=${APP_PROTOCOL}
      - APP_DOMAIN=${APP_DOMAIN}
      - APP_PORT=${APP_PORT}
      - STAGING_APP_URL=${STAGING_APP_URL}
      - PRODUCTION_APP_URL=${PRODUCTION_APP_URL}
      - PROFILE_EDIT_URL=${PROFILE_EDIT_URL}
      - WEB_TEST_PROTOCOL=${WEB_TEST_PROTOCOL}
      - WEB_TEST_HOST=${WEB_TEST_HOST}
      - WEB_TEST_PORT=${WEB_TEST_PORT}
      
      # GCP / Infra
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_ZONE=${GCP_ZONE}
      - GCP_VM_NAME=${GCP_VM_NAME}
      - GCP_VM_IP=${GCP_VM_IP}
      - GCP_MACHINE_TYPE=${GCP_MACHINE_TYPE}
      - VM_SSH_USER=${VM_SSH_USER}
      - GCP_SA_KEY_PATH=${GCP_SA_KEY_PATH}
      
      # Database & Redis
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      
      # Poste.io (SMTP + API + DB)
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - POSTE_ADMIN_PASSWORD=${POSTE_ADMIN_PASSWORD}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - POSTE_PROTOCOL=${POSTE_PROTOCOL}
      - POSTE_HOSTNAME=${POSTE_HOSTNAME}
      - POSTE_PORT=${POSTE_PORT}
      - POSTE_API_USER=${POSTE_API_USER}
      - POSTE_DOMAIN=${POSTE_DOMAIN}
      - POSTEIO_DB_HOST=${POSTEIO_DB_HOST}
      - POSTEIO_DB_PORT=${POSTEIO_DB_PORT}
      - POSTEIO_DB_NAME=${POSTEIO_DB_NAME}
      - POSTEIO_DB_USER=${POSTEIO_DB_USER}
      - POSTEIO_DB_PASSWORD=${POSTEIO_DB_PASSWORD}
      
      # SSL / Tunneling
      - SSL_CERT_FILE=${SSL_CERT_FILE}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE}
      - NODE_EXTRA_CA_CERTS=${NODE_EXTRA_CA_CERTS}
      - TUNNEL_ENABLED=${TUNNEL_ENABLED}
      - TUNNEL_SUBDOMAIN=${TUNNEL_SUBDOMAIN}
      - TUNNEL_URL=${TUNNEL_URL}
      - NGR_AUTHTOKEN=${NGR_AUTHTOKEN}
      
      # Social Auth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET}
      
      # Admin, Support, Regular User & Test User Accounts
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_FIRST_NAME=${ADMIN_FIRST_NAME}
      - ADMIN_LAST_NAME=${ADMIN_LAST_NAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL}
      - REGULARUSER_EMAIL=${REGULARUSER_EMAIL}
      - REGULARUSER_FIRST_NAME=${REGULARUSER_FIRST_NAME}
      - REGULARUSER_LAST_NAME=${REGULARUSER_LAST_NAME}
      - REGULARUSER_PASSWORD=${REGULARUSER_PASSWORD}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
      - STAFF_ADMIN_EMAIL=${STAFF_ADMIN_EMAIL}
      - STAFF_ADMIN_PASSWORD=${STAFF_ADMIN_PASSWORD}
      - INACTIVE_ADMIN_EMAIL=${INACTIVE_ADMIN_EMAIL}
      - INACTIVE_ADMIN_PASSWORD=${INACTIVE_ADMIN_PASSWORD}
      
      # Git / CI
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_REPO_PROTOCOL=${GIT_REPO_PROTOCOL}
      - GIT_REPO_DOMAIN=${GIT_REPO_DOMAIN}
      - GIT_REPO_USERNAME=${GIT_REPO_USERNAME}
      - GIT_REPO_REPONAME=${GIT_REPO_REPONAME}
      - ENC_PASSPHRASE=${ENC_PASSPHRASE}
      
      # Ports
      - WEB_HOST_PORT=${WEB_HOST_PORT}
      - WEB_HTTPS_PORT=${WEB_HTTPS_PORT}
      - NGINX_STAGING_HOST_PORT=${NGINX_STAGING_HOST_PORT}
      - NGINX_PRODUCTION_HOST_PORT=${NGINX_PRODUCTION_HOST_PORT}
