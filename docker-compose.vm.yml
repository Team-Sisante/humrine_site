services:
  # Staging Web Service
  web-staging:
    container_name: humrine-web-staging
    image: ghcr.io/xmione/humrine_site-web:latest
    restart: unless-stopped
    env_file:
      - .env.staging
    networks:
      - humrine-network
    profiles:
      - staging

  # Staging Nginx (HTTPS Proxy)
  nginx-staging:
    container_name: humrine-nginx-staging
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_HTTPS_PORT_STAGING:-8001}:${WEB_HTTPS_PORT_STAGING:-8001}"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    depends_on:
      - web-staging
    networks:
      - humrine-network
    profiles:
      - staging

  # Production Web Service
  web-production:
    container_name: humrine-web-production
    image: ghcr.io/xmione/humrine_site-web:latest
    restart: unless-stopped
    env_file:
      - .env.production
    networks:
      - humrine-network
    profiles:
      - production

  # Production Nginx (HTTPS Proxy)
  nginx-production:
    container_name: humrine-nginx-production
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_HTTPS_PORT_PRODUCTION:-8000}:${WEB_HTTPS_PORT_PRODUCTION:-8000}"
    volumes:
      - ./nginx-production.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    depends_on:
      - web-production
    networks:
      - humrine-network
    profiles:
      - production

networks:
  humrine-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1460
