{% load static %}
<div class="row mt-4">
    {% for post in posts %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                {% if post.image %}
                    <img src="{{ post.image.url }}" class="card-img-top img-fluid" alt="{{ post.title }}">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="text-muted small">{{ post.published|date:"M d, Y" }}</p>
                    <p class="card-text flex-grow-1">{{ post.body|safe|truncatechars_html:120 }}</p>
                    <a href="{{ post.get_absolute_url }}" class="btn btn-outline-primary mt-auto">Read More</a>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col-12">
            <p class="text-muted">No articles yet – check back soon!</p>
        </div>
    {% endfor %}
</div>
