{% extends "base.html" %}

{% block title %}{{ post.title }} – Humrine{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-3">{{ post.title }}</h1>
    <p class="text-muted">{{ post.published|date:"F j, Y" }}</p>
    {% if post.image %}
        <img src="{{ post.image.url }}" class="img-fluid rounded mb-4" alt="{{ post.title }}">
    {% endif %}
    <div class="lead">
        {{ post.body|linebreaks }}
    </div>
    <a href="{% url 'blog_list' %}" class="btn btn-outline-primary mt-4">&larr; Back to Blog</a>
</div>
{% endblock %}
