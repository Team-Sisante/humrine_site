{% extends "base.html" %}
{% load static %}

{% block title %}{{ post.title }} – Humrine Blog{% endblock %}

{% block content %}
<div class="container py-5">
    <article>
        {% if post.image %}
        <div class="text-center mb-4">
            <img src="{{ post.image.url }}" class="img-fluid rounded shadow" alt="{{ post.title }}" style="max-height: 400px; width: 100%; object-fit: cover;">
        </div>
        {% endif %}
        <header class="mb-4">
            <h1 class="fw-bold">{{ post.title }}</h1>
            <p class="text-muted">
                <i class="far fa-calendar-alt"></i> {{ post.published|date:"F j, Y" }}
            </p>
        </header>
        <div class="lead">
            {{ post.body|linebreaks }}
        </div>
    </article>
    <hr>
    <a href="{% url 'blog_list' %}" class="btn btn-outline-secondary">&larr; Back to Blog</a>
</div>
{% endblock %}
