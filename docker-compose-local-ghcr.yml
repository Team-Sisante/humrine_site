services:
  web:
    image: ghcr.io/team-sisante/humrine_site-web:latest
    container_name: humrine_site_web
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./data:/app/data          # persistent data (media, db.sqlite3 if used)
    networks:
      - humrine-network

  db:
    image: postgres:14
    container_name: humrine_site_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-badminton_court}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - humrine-network

  redis:
    image: redis:7-alpine
    container_name: humrine_site_redis
    ports:
      - "6379:6379"
    networks:
      - humrine-network

  # Optional: mail (if needed – uncomment if you have a mail image)
  # mail:
  #   image: ghcr.io/team-sisante/humrine_site-mail:latest
  #   container_name: humrine_site_mail
  #   environment:
  #     - POSTE_ADMIN_PASSWORD=${POSTE_ADMIN_PASSWORD}
  #     - POSTE_DOMAIN=${POSTE_DOMAIN}
  #   ports:
  #     - "25:25"
  #     - "465:465"
  #     - "587:587"
  #   volumes:
  #     - ./mail_data:/data
  #   networks:
  #     - humrine-network

networks:
  humrine-network:
    driver: bridge